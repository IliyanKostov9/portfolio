# fly.toml app configuration file generated for iliyankostov-portfolio-white-tree-8379 on 2026-07-02T23:16:05+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'iliyankostov-portfolio-white-tree-8379'
primary_region = 'cdg'
console_command = '/app/.venv/bin/python3 src/manage.py shell'

[build]

[deploy]
  release_command = '/app/.venv/bin/python3 src/manage.py migrate --noinput'

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 2

[[statics]]
  guest_path = '/var/www/portfolio.ikostov.org/static'
  url_prefix = '/static/'
